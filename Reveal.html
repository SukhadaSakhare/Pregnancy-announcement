<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>We're Expecting ❤️</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{
    background:linear-gradient(180deg,#FFF6FB,#FFE7F1);
    overflow:hidden;
}
.container{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    padding:20px;
}
.gift{
    font-size:90px;
    cursor:pointer;
    animation:shake 2s infinite;
}
.hidden{
    display:none;
}
.message{
    animation:fadeUp 2s ease;
}
.message h1{
    color:#E75480;
    font-size:42px;
    margin-bottom:20px;
}
.message h2{
    color:#555;
    font-weight:400;
    line-height:1.8;
}
.bigFoot{
    font-size:70px;
    margin:20px;
    animation:pulse 2s infinite;
}
.footer{
    margin-top:40px;
    color:#E75480;
    font-size:24px;
    font-weight:bold;
}
.confetti{
    position:fixed;
    top:-30px;
    font-size:24px;
    animation:fall linear forwards;
}
@keyframes shake{
    0%,100%{transform:rotate(-4deg);}
    50%{transform:rotate(4deg);}
}
@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.15);}
}
@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
.openBtn{
    margin-top:25px;
    background:#ff6f91;
    color:white;
    border:none;
    border-radius:40px;
    padding:15px 35px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
<div id="giftSection">
<div class="gift">
🎁
</div>
<h2>A little gift for you...</h2>
<button class="openBtn" onclick="openGift()">
Open Gift ❤️
</button>
</div>
<div id="message" class="hidden message">
<div class="bigFoot">
👣
</div>
<h1>We're Expecting!</h1>
<h2>
Our family is growing by
two tiny little feet.
<br><br>
The greatest adventure
of our lives is about to begin.
<br><br>
We can't wait for you
to meet our little miracle.
</h2>
<div class="bigFoot">
👣
</div>
<div class="footer">
❤️ Coming Soon ❤️
</div>
</div>
</div>
<script>
function openGift(){
document.getElementById("giftSection").style.display="none";
document.getElementById("message").classList.remove("hidden");
let emoji=["🎉","✨","💖","💕","🎊","🍼","👣","🌸"];
for(let i=0;i<120;i++){
let c=document.createElement("div");
c.className="confetti";
c.innerHTML=emoji[Math.floor(Math.random()*emoji.length)];
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);
setTimeout(()=>{
c.remove();
},5000);
}
}
</script>
</body>
</html>
